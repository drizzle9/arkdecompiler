<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Starting arkdecompiler...</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #1e1e1e;
        color: #d0d0d0;
        font-family: "Segoe UI", Arial, sans-serif;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .wrap {
        text-align: center;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        margin: 0 auto 10px auto;
        background: #4e9eff;
        animation: pulse 1.2s infinite ease-in-out;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.3; transform: scale(0.85); }
        50% { opacity: 1; transform: scale(1); }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="dot"></div>
      <div>Starting arkdecompiler...</div>
    </div>
  </body>
</html>
